<header class="bg-primary-container/85 backdrop-blur-md sticky top-0 z-40 border-b border-outline-variant/10 shadow-sm">
  <div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop max-w-max-width mx-auto h-16 md:h-20 gap-2">
    <div class="flex items-center gap-4 md:gap-gutter min-w-0">
      <button
        (click)="toggleMobileMenu()"
        class="md:hidden text-on-primary-container p-2 -ml-2 shrink-0"
        [attr.aria-expanded]="mobileMenuOpen()"
        aria-label="Toggle menu">
        <span class="material-symbols-outlined">{{ mobileMenuOpen() ? 'close' : 'menu' }}</span>
      </button>
      <a routerLink="/" (click)="closeMobileMenu()" class="font-headline-md text-[18px] md:text-headline-md font-bold text-on-primary-container truncate">Thaghr Market</a>
      <nav class="hidden md:flex gap-6">
        <a routerLink="/" routerLinkActive="text-secondary font-bold border-b-2 border-secondary"
           [routerLinkActiveOptions]="{ exact: true }"
           class="text-on-primary-container/80 hover:text-secondary transition-colors font-body-sm text-body-sm">Explore</a>
        <a routerLink="/" class="text-on-primary-container/80 hover:text-secondary transition-colors font-body-sm text-body-sm">Categories</a>
      </nav>
    </div>

    <div class="flex items-center gap-3 md:gap-6 shrink-0">
      <div class="relative hidden lg:block">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-primary-container/60">search</span>
        <input
          #searchInput
          (keyup.enter)="onSearch(searchInput.value)"
          class="bg-surface-container-low border-none rounded-lg pl-10 pr-4 py-2 text-body-sm font-body-sm w-64 focus:ring-2 focus:ring-secondary"
          placeholder="Search premium items..."
          type="text" />
      </div>

      <div class="flex items-center gap-3 md:gap-4">
        <button
          (click)="toggleMobileMenu()"
          class="lg:hidden text-on-primary-container/80 hover:text-secondary transition-colors"
          aria-label="Search">
          <span class="material-symbols-outlined">search</span>
        </button>

        <button routerLink="/cart" (click)="closeMobileMenu()" class="text-on-primary-container/80 hover:text-secondary transition-colors relative">
          <span class="material-symbols-outlined">shopping_cart</span>
          @if (cartCount() > 0) {
            <span class="absolute -top-1 -right-1 bg-secondary text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">{{ cartCount() }}</span>
          }
        </button>

        @if (isAuthenticated()) {
          <button routerLink="/account" (click)="closeMobileMenu()" class="flex items-center gap-2 font-body-sm text-body-sm font-bold text-on-primary-container hover:text-secondary transition-colors">
            <span class="material-symbols-outlined text-[20px]">account_circle</span>
            <span class="hidden lg:inline">{{ currentUser()?.name }}</span>
          </button>
          <button (click)="logout()" class="text-on-primary-container/60 hover:text-secondary transition-colors" title="Sign out">
            <span class="material-symbols-outlined text-[20px]">logout</span>
          </button>
        } @else {
          <button routerLink="/login" (click)="closeMobileMenu()" class="bg-secondary text-white px-4 md:px-6 py-2 rounded font-body-sm text-body-sm font-semibold hover:opacity-90 transition-all active:scale-95 whitespace-nowrap">Sign In</button>
        }
      </div>
    </div>
  </div>

  <!-- Mobile dropdown: nav links + search, shown below lg -->
  @if (mobileMenuOpen()) {
    <div class="lg:hidden border-t border-outline-variant/10 bg-primary-container px-margin-mobile py-4 space-y-4">
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-primary-container/60">search</span>
        <input
          #mobileSearchInput
          (keyup.enter)="onSearch(mobileSearchInput.value)"
          class="bg-surface-container-low border-none rounded-lg pl-10 pr-4 py-3 text-body-sm font-body-sm w-full focus:ring-2 focus:ring-secondary"
          placeholder="Search premium items..."
          type="text" />
      </div>
      <nav class="md:hidden flex flex-col gap-1">
        <a routerLink="/" (click)="closeMobileMenu()" routerLinkActive="text-secondary font-bold"
           [routerLinkActiveOptions]="{ exact: true }"
           class="text-on-primary-container/90 py-2 font-body-md text-body-md">Explore</a>
        <a routerLink="/" (click)="closeMobileMenu()" class="text-on-primary-container/90 py-2 font-body-md text-body-md">Categories</a>
      </nav>
    </div>
  }
</header>
